services:
  oracle-db:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: springshop_db
    environment:
      - ORACLE_PASSWORD=senha_admin_root
      - APP_USER=springshop_api_database
      - APP_USER_PASSWORD=senha_do_banco_aqui
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

  api:
    build: .
    container_name: springshop_api
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=springshop_api_database
      - SPRING_DATASOURCE_PASSWORD=senha_do_banco_aqui
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - oracle-db

volumes:
  oracle_data: